id: no-docx-display-scale-in-layout
language: TypeScript
severity: error
message: DOCX layout is point-space and cannot depend on display scale, DPR, or Canvas paint types.
note: |
  Authored OOXML properties such as `charScale` remain valid. Generic paint
  `.scale`, `.dpr`, `.displayScale`, Canvas contexts, and paint option/context
  types are forbidden in layout modules.
rule:
  any:
    - pattern: $OBJ.scale
    - pattern: $OBJ.dpr
    - pattern: $OBJ['dpr']
    - pattern: $OBJ.displayScale
    - pattern: $OBJ['displayScale']
    - pattern: "const { dpr: $DPR } = $OBJ"
    - pattern: "const { dpr } = $OBJ"
    - pattern: "const { displayScale: $DISPLAY } = $OBJ"
    - pattern: "const { displayScale } = $OBJ"
    - kind: type_identifier
      regex: "^(CanvasRenderingContext2D|OffscreenCanvasRenderingContext2D|PaintPageOptions|CanvasPaintContext)$"
files:
  - "packages/docx/src/layout/**/*.ts"
  - "packages/docx/src/layout/**/*.tsx"
ignores:
  - "packages/docx/src/layout/**/*.test.ts"
  - "packages/docx/src/layout/**/*.test.tsx"
