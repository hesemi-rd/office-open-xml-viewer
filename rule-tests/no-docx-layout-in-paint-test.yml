  - "import { orderedPagePaintNodes } from '../layout/page-graph.js';"
  - "ctx.fillText(run.text, run.xPt, run.baselinePt);"
  - "ctx.fillRect(rect.xPt, rect.yPt, rect.widthPt, rect.heightPt);"
invalid:
