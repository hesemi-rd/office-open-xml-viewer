packages:
  - "packages/*"
  - "site"

# Keep dependency build-script decisions explicit so a newly introduced script
# fails installation until it is reviewed. skia-canvas is the sole approval: it
# ships its native binding via node-pre-gyp rather than optionalDependencies, so
# disabling its install script leaves lib/v8/index.node absent. The denied tools
# resolve through optional/prebuilt binaries for the workflows in this repo.
allowBuilds:
  "@ast-grep/cli": false
  "@swc/core": false
  "@vscode/vsce-sign": false
  esbuild: false
  keytar: false
  sharp: false
  skia-canvas: true
