name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Rust quality gate for the parser workspace. Runs without the (gitignored,
  # redistribution-prohibited) sample files: the sample-dependent parser tests
  # skip themselves when the fixtures are absent.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ast-grep lint runs on source only (no WASM needed) — fail fast.
      - name: ast-grep rule tests
        run: pnpm lint:test

      - name: Lint
        run: pnpm lint

      # Unit tests for pure-logic modules (formula engine, number formats).
      # No WASM needed.
      - name: Unit tests
        run: pnpm test

      # The WASM parsers are git-ignored build output; the TypeScript packages
      # import their generated .d.ts/.js, so typecheck requires building them first.
      - name: Build WASM
        run: pnpm build:wasm

      - name: Typecheck
        run: pnpm typecheck

      - name: Build packages
        run: pnpm build:packages
