<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>XLSX Viewer – list data-validation dropdown fixture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #fff; }
    #host { width: 900px; height: 600px; }
  </style>
</head>
<body>
<div id="host"></div>
<script type="module">
  import { XlsxViewer } from '/src/index.ts';

  const params = new URLSearchParams(location.search);
  const file = params.get('file') ?? 'validation-fixture.xlsx';
  const host = document.getElementById('host');

  const viewer = new XlsxViewer(host, {
    onReady: () => { document.body.dataset.status = 'ready'; },
    onError: (e) => {
      document.body.dataset.status = 'error';
      document.body.dataset.errorMessage = e instanceof Error ? e.message : String(e);
    },
  });
  // Expose for the Playwright spec to drive programmatic selection.
  window.__viewer = viewer;

  await viewer.load('/' + file);
</script>
</body>
</html>
