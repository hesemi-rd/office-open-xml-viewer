<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; }
    canvas { display: block; }
  </style>
  <!-- Pre-load common theme fonts used in OOXML presentations via fontsource -->
  <style>
    @import url('/node_modules/@fontsource/nunito-sans/400.css');
    @import url('/node_modules/@fontsource/nunito-sans/400-italic.css');
    @import url('/node_modules/@fontsource/nunito-sans/700.css');
    @import url('/node_modules/@fontsource/nunito-sans/700-italic.css');
    @import url('/node_modules/@fontsource/nunito-sans/300.css');
    @import url('/node_modules/@fontsource/nunito-sans/600.css');
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script type="module">
    import { PptxViewer } from '/src/index.ts';

    const params   = new URLSearchParams(location.search);
    const slideIdx = Math.max(0, parseInt(params.get('slide') ?? '0', 10));
    const pptxName = params.get('pptx') ?? 'sample';
    // Optional render width override (CSS px), e.g. ?width=960 — used by the
    // scale-parameterised specs; the default matches the reference images.
    const width    = Math.max(1, parseInt(params.get('width') ?? '1280', 10));

    const canvas = document.getElementById('canvas');
    const viewer = new PptxViewer(canvas, {
      width,
      onError: (err) => {
        document.body.dataset.status = 'error';
        document.body.dataset.errorMessage = err.message;
        console.error('[fixture] error:', err);
      },
    });

    try {
      const resp = await fetch(`/${pptxName}.pptx`);
      if (!resp.ok) throw new Error(`fetch failed: ${resp.status}`);
      const buf = await resp.arrayBuffer();
      await viewer.load(buf);
      if (slideIdx !== 0) {
        await viewer.goToSlide(slideIdx);
      }
      document.body.dataset.status = 'ready';
    } catch (err) {
      document.body.dataset.status = 'error';
      document.body.dataset.errorMessage = String(err);
      console.error('[fixture] fatal:', err);
    }
  </script>
</body>
</html>
